name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v30.2.0-tn3-soft-launch)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            jobs: 4
          # macOS (arm64) is DISABLED by default: macos-latest is the 10x
          # billing tier, and a full from-scratch build runs long enough that
          # a single build can cost more than the whole Actions budget. To
          # ship macOS binaries, uncomment the block below AND make sure the
          # ccache cache is warm first (run the workflow once via
          # workflow_dispatch, let it populate the cache, then real tags
          # build in a few minutes). Keep -j bounded (3) -- unbounded -j on
          # a from-scratch build OOMs/thrashes the runner.
          # - os: macos-latest
          #   platform: macos-arm64
          #   jobs: 3
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building tag: $TAG"

      - name: Install apt deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
              build-essential cmake pkg-config \
              libboost-dev libevent-dev libsqlite3-dev \
              ccache

      - name: Install brew deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install --quiet cmake boost libevent sqlite ccache llvm

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: release-ccache-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            release-ccache-${{ matrix.platform }}-

      - name: Configure
        env:
          CCACHE_DIR: ${{ github.workspace }}/../.ccache
        run: |
          # ccache compiler launchers keep re-runs fast; bounded -j (set per
          # platform below) keeps a from-scratch build inside the runner's
          # memory budget -- unbounded -j is what blew up the first attempt.
          ARGS=( -DCMAKE_BUILD_TYPE=Release -DENABLE_IPC=OFF
                 -DCMAKE_C_COMPILER_LAUNCHER=ccache
                 -DCMAKE_CXX_COMPILER_LAUNCHER=ccache )
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            ARGS+=( -DCMAKE_C_COMPILER=/opt/homebrew/opt/llvm/bin/clang )
            ARGS+=( -DCMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ )
          fi
          cmake -B build "${ARGS[@]}"

      - name: Build (bounded parallelism)
        run: |
          cmake --build build --parallel ${{ matrix.jobs }} \
                --target bitcoind bitcoin-cli truenorth-miner

      - name: Strip release symbols
        run: |
          strip build/bin/bitcoind build/bin/bitcoin-cli build/bin/truenorth-miner || true
          ls -la build/bin/

      - name: Smoke test (start, mine one regtest block, stop)
        timeout-minutes: 5
        run: |
          DD=$(mktemp -d)
          ./build/bin/bitcoind -regtest -datadir="$DD" -daemon
          ./build/bin/bitcoin-cli -regtest -datadir="$DD" -rpcwait createwallet ci > /dev/null
          ADDR=$(./build/bin/bitcoin-cli -regtest -datadir="$DD" getnewaddress)
          ./build/bin/bitcoin-cli -regtest -datadir="$DD" generatetoaddress 1 "$ADDR" > /dev/null
          COUNT=$(./build/bin/bitcoin-cli -regtest -datadir="$DD" getblockcount)
          ./build/bin/bitcoin-cli -regtest -datadir="$DD" stop > /dev/null
          [ "$COUNT" = "1" ] || { echo "FAIL: smoke produced $COUNT blocks"; exit 1; }

      - name: Package tarball
        id: package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          STAGE="truenorth-${TAG}-${{ matrix.platform }}"
          mkdir -p "${STAGE}/bin"
          cp build/bin/bitcoind          "${STAGE}/bin/"
          cp build/bin/bitcoin-cli       "${STAGE}/bin/"
          cp build/bin/truenorth-miner   "${STAGE}/bin/"
          cp README.md COPYING "${STAGE}/"
          tar czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" 2>/dev/null \
            || shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          ls -la "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256"
          cat "${STAGE}.tar.gz.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(steps.tag.outputs.tag, 'tn3') || contains(steps.tag.outputs.tag, 'soft') || contains(steps.tag.outputs.tag, 'pre') || contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            truenorth-*-${{ matrix.platform }}.tar.gz
            truenorth-*-${{ matrix.platform }}.tar.gz.sha256
