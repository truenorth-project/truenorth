name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v30.2.0-tn3-soft-launch)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            jobs: 4
          # macOS arm64 (Apple Silicon). GitHub Actions is free for public
          # repos at all runner tiers, so the 10x billing tier on
          # macos-latest is not a cost concern here. Bounded -j (3) keeps
          # a from-scratch build inside the runner's memory budget.
          - os: macos-latest
            platform: macos-arm64
            jobs: 3
          # Windows: not built. WSL2 users run the linux-x86_64 binary.
          # Native Windows would need either cross-compilation via depends/
          # or a windows-latest matrix entry with mingw-w64; defer until
          # there's tester demand.
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building tag: $TAG"

      - name: Install apt deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
              build-essential cmake pkg-config \
              libboost-dev libevent-dev libsqlite3-dev \
              ccache

      - name: Install brew deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # llvm dropped: Homebrew LLVM 22+ headers don't compose with the
          # Xcode macOS SDK. We use Apple Clang instead (see Configure step).
          brew install --quiet cmake boost libevent sqlite ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: release-ccache-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            release-ccache-${{ matrix.platform }}-

      - name: Configure
        env:
          CCACHE_DIR: ${{ github.workspace }}/../.ccache
        run: |
          # ccache compiler launchers keep re-runs fast; bounded -j (set per
          # platform below) keeps a from-scratch build inside the runner's
          # memory budget -- unbounded -j is what blew up the first attempt.
          # On macOS we deliberately use Apple Clang (the system default)
          # rather than Homebrew LLVM: Homebrew LLVM 22+ has stdc++ headers
          # that no longer compose with Xcode's macOS SDK (basic types like
          # size_t and __uint32_t fail to resolve). Apple Clang in current
          # Xcode supports the consteval features we need.
          ARGS=( -DCMAKE_BUILD_TYPE=Release -DENABLE_IPC=OFF
                 -DCMAKE_C_COMPILER_LAUNCHER=ccache
                 -DCMAKE_CXX_COMPILER_LAUNCHER=ccache )
          cmake -B build "${ARGS[@]}"

      - name: Build (bounded parallelism)
        run: |
          cmake --build build --parallel ${{ matrix.jobs }} \
                --target truenorthd truenorth-cli truenorth-miner

      - name: Strip release symbols
        run: |
          strip build/bin/truenorthd build/bin/truenorth-cli build/bin/truenorth-miner || true
          ls -la build/bin/

      - name: Smoke test (start, mine one regtest block, stop)
        timeout-minutes: 5
        run: |
          DD=$(mktemp -d)
          ./build/bin/truenorthd -regtest -datadir="$DD" -daemon
          ./build/bin/truenorth-cli -regtest -datadir="$DD" -rpcwait createwallet ci > /dev/null
          ADDR=$(./build/bin/truenorth-cli -regtest -datadir="$DD" getnewaddress)
          ./build/bin/truenorth-cli -regtest -datadir="$DD" generatetoaddress 1 "$ADDR" > /dev/null
          COUNT=$(./build/bin/truenorth-cli -regtest -datadir="$DD" getblockcount)
          ./build/bin/truenorth-cli -regtest -datadir="$DD" stop > /dev/null
          [ "$COUNT" = "1" ] || { echo "FAIL: smoke produced $COUNT blocks"; exit 1; }

      - name: Package tarball
        id: package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          STAGE="truenorth-${TAG}-${{ matrix.platform }}"
          mkdir -p "${STAGE}/bin" "${STAGE}/doc"
          cp build/bin/truenorthd          "${STAGE}/bin/"
          cp build/bin/truenorth-cli       "${STAGE}/bin/"
          cp build/bin/truenorth-miner   "${STAGE}/bin/"
          cp README.md COPYING "${STAGE}/"
          # Tester-relevant docs travel with the binary so an onion-only
          # operator doesn't have to bounce back to a browser.
          cp doc/testnet.md "${STAGE}/doc/"
          tar czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" 2>/dev/null \
            || shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          ls -la "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256"
          cat "${STAGE}.tar.gz.sha256"

      - name: Upload to GitHub Release
        # ncipollo/release-action handles existing releases via allowUpdates,
        # avoiding the "tag_name already_exists" PATCH failure that
        # softprops/action-gh-release@v2 hits on re-runs against an existing
        # tag.
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generateReleaseNotes: true
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          prerelease: ${{ contains(steps.tag.outputs.tag, 'tn3') || contains(steps.tag.outputs.tag, 'soft') || contains(steps.tag.outputs.tag, 'pre') || contains(steps.tag.outputs.tag, 'rc') }}
          artifacts: "truenorth-*-${{ matrix.platform }}.tar.gz,truenorth-*-${{ matrix.platform }}.tar.gz.sha256"
